const { useState, useEffect, useCallback, useMemo, useRef } = React;

const SUPABASE_URL = 'https://xsnwsxhdqfcbhwujwgmr.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_GoNVy0V0T4F3hStcjXL3CQ_GvPqj4Vm';

try {

  if (sbLib && sbLib.createClient) {

// ===== ACHIEVEMENTS =====
const ACH_LS_KEY = 'lem-achievements';
const ACHIEVEMENTS = [
  {id:'first_profit', em:'💰', n:'רווח ראשון', d:'סיים יום עם רווח חיובי',
   chk: ({res}) => res.some(r => r.profit > 0)},
  {id:'big_day', em:'📈', n:'יום ענק', d:'רווח של ₪50 ביום אחד',
   chk: ({res}) => res.some(r => r.profit >= 50)},
  {id:'hundred_cups', em:'💯', n:'יום מושלם', d:'100 כוסות ביום אחד',
   chk: ({res}) => res.some(r => r.sold >= 100)},
  {id:'streak_3', em:'🔥', n:'רצף מנצח', d:'3 ימים רצופים של רווח חיובי',
   chk: ({res}) => {let c=0;for(const r of res){if(r.profit>0){c++;if(c>=3)return true;}else c=0;}return false;}},
  {id:'five_star_rep', em:'🌟', n:'כוכב הקהילה', d:'הגע למוניטין 90+',
   chk: ({res, rp}) => (rp||0) >= 90 || res.some(r => r.rA >= 90)},
  {id:'storm_survivor', em:'🌪️', n:'שורד הסופה', d:'רווח חיובי ביום גשם או קור',
   chk: ({dayLog, res}) => dayLog.some((d,i) => (d.weather?.includes('גשם')||d.weather?.includes('קר'))&&(res[i]?.profit||0)>0)},
  {id:'viral_hit', em:'🎯', n:'להיט ויראלי', d:'50+ כוסות ומוניטין 80+ באותו יום',
   chk: ({res}) => res.some(r => r.sold >= 50 && r.rA >= 80)},
  {id:'millionaire', em:'👑', n:'מיליונר הלימונדה', d:'רווח כולל של ₪500 במשחק אחד',
   chk: ({res, ln, gameOver}) => gameOver && (res.reduce((s,r)=>s+r.profit,0)-(ln||0)) >= 500},
  {id:'five_stars', em:'⭐', n:'5 כוכבים', d:'סיים משחק עם 5 כוכבים',
   chk: ({res, ln, gameOver}) => gameOver && (res.reduce((s,r)=>s+r.profit,0)-(ln||0)) >= 120},
  {id:'no_waste', em:'🍋', n:'לא התבזבז', d:'סיים משחק ללא לימונים שפג תוקפם',
   chk: ({res, gameOver}) => gameOver && res.length>0 && res.every(r => !r.ex || r.ex === 0)},
  {id:'first_place', em:'🏆', n:'מלך התחרות', d:'סיים משחק עם רווח גבוה מכל המתחרים',
   chk: ({res, ln, npcState, gameOver}) => {
     if(!gameOver || !res[0]?.compSnap || res[0].compSnap.length===0) return false;
     const myProfit = res.reduce((s,r)=>s+r.profit,0)-(ln||0);
     const nC = res[0].compSnap.length;
     for(let ci=0;ci<nC;ci++){
       const cp = res.reduce((s,r)=>s+(r.compSnap?.[ci]?.profit||0),0)-(npcState?.[ci]?.ln||0);
       if(cp >= myProfit) return false;
     }
     return true;
   }},
  {id:'no_loan', em:'🏦', n:'עצמאות כלכלית', d:'סיים משחק בלי לקחת הלוואה',
   chk: ({ln, loanEverTaken, gameOver}) => gameOver && !loanEverTaken},
  {id:'hard_mode', em:'💪', n:'קשוח', d:'סיים משחק ברמת קושי "קשה" עם רווח חיובי',
   chk: ({cl, res, ln, gameOver}) => gameOver && cl==='hard' && (res.reduce((s,r)=>s+r.profit,0)-(ln||0))>=0},
  {id:'speed_run', em:'⚡', n:'זינוק מהיר', d:'רווח חיובי כבר ביום הראשון',
   chk: ({res}) => res.length>0 && res[0].profit > 0},
  {id:'comeback', em:'🔄', n:'קאמבק', d:'יום הפסד ואז 3 ימי רווח',
   chk: ({res}) => {for(let i=0;i<=res.length-4;i++){if(res[i].profit<0 && res[i+1].profit>0 && res[i+2].profit>0 && res[i+3].profit>0)return true;}return false;}},
];
const loadAchievements = () => {
  try { return JSON.parse(localStorage.getItem(ACH_LS_KEY) || '[]'); }
  catch(e) { return []; }
};
const saveAchievements = (list) => {
  try { localStorage.setItem(ACH_LS_KEY, JSON.stringify(list)); } catch(e) {}
};

// ===== AUTH MODAL COMPONENT =====
const AuthModal = ({onClose, onAuth, supabaseClient}) => {
  const [mode, setMode] = useState('login');
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [name, setName] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);

  const handleEmail = async () => {
    if (!supabaseClient) { setErr('Supabase לא מוגדר'); return; }
    setLoading(true); setErr('');
    try {
      if (mode === 'register') {
        const { data, error } = await supabaseClient.auth.signUp({
          email, password: pass, options: { data: { display_name: name || email.split('@')[0] } }
        });
        if (error) throw error;
        if (data.user) {
          await supabaseClient.from('profiles').upsert({
            id: data.user.id, username: name || email.split('@')[0], created_at: new Date().toISOString()
          });
          onAuth(data.user, name || email.split('@')[0]);
        }
      } else {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password: pass });
        if (error) throw error;
        const { data: profile } = await supabaseClient.from('profiles').select('username').eq('id', data.user.id).single();
        onAuth(data.user, profile?.username || email.split('@')[0]);
      }
    } catch(e) { setErr(e.message || 'שגיאה'); }
    setLoading(false);
  };

  const handleGoogle = async () => {
    if (!supabaseClient) { setErr('Supabase לא מוגדר'); return; }
    try {
      const { error } = await supabaseClient.auth.signInWithOAuth({
        provider: 'google', options: { redirectTo: 'https://lemonade-stand-game-kappa.vercel.app' }
      });
      if (error) throw error;
    } catch(e) { setErr(e.message); }
  };

  const inputStyle = {width:'100%',padding:'10px 14px',borderRadius:10,border:'1px solid #E0D5C0',fontSize:14,
    fontFamily:'inherit',outline:'none',background:'rgba(255,255,255,.7)',transition:'border .2s'};

  return (
    <div style={{position:'fixed',inset:0,zIndex:100,background:'rgba(0,0,0,.5)',backdropFilter:'blur(4px)',
      display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:'linear-gradient(135deg,#FFF8E7,#FFF0D4)',borderRadius:20,padding:'28px 24px',
        maxWidth:380,width:'100%',boxShadow:'0 20px 60px rgba(0,0,0,.2)',border:'1px solid rgba(255,215,0,.3)'}}>
        <div style={{textAlign:'center',marginBottom:20}}>
          <div style={{fontSize:40,marginBottom:4}}>🍋</div>
          <h2 style={{fontSize:20,fontWeight:800,color:'#3E2723',margin:0}}>
            {mode==='login'?'התחברות':'הרשמה'}</h2>
          <p style={{fontSize:12,color:'#9E8E80',margin:'4px 0 0'}}>שמור את התוצאות שלך והתחרה עם כולם!</p>
        </div>

        {supabaseClient && <button onClick={handleGoogle} style={{width:'100%',padding:'10px 16px',borderRadius:12,
          border:'1px solid #E0E0E0',background:'#FFF',cursor:'pointer',fontSize:14,fontWeight:600,
          fontFamily:'inherit',display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:14,
          boxShadow:'0 2px 8px rgba(0,0,0,.06)',transition:'transform .2s'}}
          onMouseEnter={e=>e.target.style.transform='scale(1.02)'} onMouseLeave={e=>e.target.style.transform='scale(1)'}>
          <span style={{fontSize:18}}>G</span> התחבר עם Google
        </button>}

        {supabaseClient && <div style={{display:'flex',alignItems:'center',gap:10,margin:'14px 0'}}>
          <div style={{flex:1,height:1,background:'#E0D5C0'}}/><span style={{fontSize:11,color:'#9E8E80'}}>או</span>
          <div style={{flex:1,height:1,background:'#E0D5C0'}}/></div>}

        {mode==='register' && <input value={name} onChange={e=>setName(e.target.value)}
          placeholder="שם תצוגה" style={{...inputStyle,marginBottom:8}} />}
        <input value={email} onChange={e=>setEmail(e.target.value)} type="email"
          placeholder="אימייל" style={{...inputStyle,marginBottom:8}} />
        <input value={pass} onChange={e=>setPass(e.target.value)} type="password"
          placeholder="סיסמה" style={{...inputStyle,marginBottom:12}}
          onKeyDown={e=>{if(e.key==='Enter')handleEmail();}} />

        {err && <div style={{color:'#E53935',fontSize:11,marginBottom:8,textAlign:'center'}}>{err}</div>}

        <button onClick={handleEmail} disabled={loading||!email||!pass}
          style={{width:'100%',padding:'12px',borderRadius:12,border:'none',
            background:loading?'#CCC':'linear-gradient(135deg,#FF6F00,#F57C00)',
            color:'#FFF',fontSize:15,fontWeight:700,cursor:loading?'wait':'pointer',
            fontFamily:'inherit',boxShadow:'0 4px 14px rgba(255,111,0,.3)'}}>
          {loading?'...':mode==='login'?'התחבר':'הירשם'}
        </button>

        <div style={{textAlign:'center',marginTop:12,fontSize:12}}>
          <span style={{color:'#9E8E80'}}>{mode==='login'?'אין חשבון? ':'כבר יש חשבון? '}</span>
          <span onClick={()=>{setMode(mode==='login'?'register':'login');setErr('');}}
            style={{color:'#FF6F00',fontWeight:700,cursor:'pointer'}}>
            {mode==='login'?'הירשם':'התחבר'}</span>
        </div>

        <button onClick={onClose} style={{display:'block',margin:'14px auto 0',background:'none',border:'none',
          color:'#9E8E80',fontSize:12,cursor:'pointer',fontFamily:'inherit'}}>המשך כאורח</button>
      </div>
    </div>
  );
};

// ===== LEADERBOARD COMPONENT =====
const Leaderboard = ({onClose, supabaseClient, currentUser, currentUsername}) => {
  const [scores, setScores] = useState([]);
  const [filter, setFilter] = useState('all');
  const [loading, setLoading] = useState(true);
  const [myBest, setMyBest] = useState(null);

  useEffect(() => {
    loadScores();
  }, [filter]);

  const loadScores = async () => {
    setLoading(true);
    if (!supabaseClient) {
      const local = JSON.parse(localStorage.getItem('lem-hi') || '[]');
      setScores(local.map((s,i) => ({rank:i+1, username:'אורח', score:s.sc, stars:s.stars, difficulty:s.cl, date:null})));
      setLoading(false); return;
    }
    try {
      let query = supabaseClient.from('game_results').select('id,score,difficulty,stars,reputation_final,cups_sold,competitors,created_at,profiles(username)')
        .order('score', {ascending: false}).limit(50);
      if (filter !== 'all') query = query.eq('difficulty', filter);
      const { data, error } = await query;
      if (error) throw error;
      const mapped = (data||[]).map((r,i) => ({
        rank: i+1, username: r.profiles?.username || 'שחקן', score: r.score,
        stars: r.stars, difficulty: r.difficulty, cups: r.cups_sold, rep: r.reputation_final,
        competitors: r.competitors, date: r.created_at, userId: r.id,
        isMe: currentUser && r.profiles?.username === currentUsername
      }));
      setScores(mapped);
      if (currentUser) {
        const mine = mapped.find(s => s.isMe);
        setMyBest(mine || null);
      }
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  const diffLabel = d => d==='easy'?'קלה':d==='medium'?'בינונית':d==='hard'?'קשה':'?';
  const diffColor = d => d==='easy'?'#43A047':d==='medium'?'#FF6F00':'#E53935';

  return (
    <div style={{position:'fixed',inset:0,zIndex:50,background:'rgba(0,0,0,.5)',backdropFilter:'blur(4px)',overflowY:'auto'}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{maxWidth:500,margin:'20px auto',background:'linear-gradient(180deg,#FFF8E7,#FFF0D4)',
        borderRadius:20,padding:'20px 16px',minHeight:'60vh',boxShadow:'0 20px 60px rgba(0,0,0,.2)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontWeight:800,fontSize:20}}>🏆 טבלת שיאים</div>
          <button onClick={onClose} style={{background:'#E53935',color:'#FFF',border:'none',borderRadius:10,
            padding:'6px 14px',fontSize:14,fontWeight:700,cursor:'pointer'}}>✕</button>
        </div>

        {myBest && <div style={{background:'linear-gradient(135deg,#E8F5E9,#C8E6C9)',borderRadius:12,padding:'10px 14px',
          marginBottom:12,border:'1px solid #A5D6A7'}}>
          <div style={{fontSize:11,color:'#2E7D32',fontWeight:700}}>הציון הטוב שלך</div>
          <div style={{fontSize:22,fontWeight:800,color:'#2E7D32'}}>#{myBest.rank} — ₪{myBest.score}</div>
        </div>}

        <div style={{display:'flex',gap:4,marginBottom:14}}>
          {['all','easy','medium','hard'].map(f => (
            <button key={f} onClick={()=>setFilter(f)}
              style={{flex:1,padding:'6px 4px',borderRadius:10,border:'none',fontSize:12,fontWeight:700,
                cursor:'pointer',fontFamily:'inherit',
                background:filter===f?'linear-gradient(135deg,#FF6F00,#F57C00)':'rgba(255,255,255,.6)',
                color:filter===f?'#FFF':'#6D4C41'}}>
              {f==='all'?'הכל':diffLabel(f)}</button>
          ))}
        </div>

        {loading ? <div style={{textAlign:'center',padding:40,color:'#9E8E80'}}>
          <div style={{fontSize:32,animation:'pulse 1.5s infinite'}}>🍋</div>טוען...</div>
        : scores.length === 0 ? <div style={{textAlign:'center',padding:40,color:'#9E8E80'}}>
          <div style={{fontSize:32}}>📭</div>אין תוצאות עדיין. היה הראשון!</div>
        : <div>
          {scores.map((s,i) => (
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',marginBottom:4,
              borderRadius:12,background:s.isMe?'linear-gradient(135deg,#E8F5E9,#C8E6C9)':'rgba(255,255,255,.6)',
              border:s.isMe?'2px solid #66BB6A':'1px solid rgba(232,213,176,.3)',
              transition:'transform .15s',cursor:'default'}}
              onMouseEnter={e=>e.currentTarget.style.transform='translateX(-2px)'}
              onMouseLeave={e=>e.currentTarget.style.transform='translateX(0)'}>
              <div style={{fontSize:18,fontWeight:800,minWidth:32,textAlign:'center',
                color:i===0?'#FFD700':i===1?'#90A4AE':i===2?'#8D6E63':'#9E8E80'}}>
                {i===0?'🥇':i===1?'🥈':i===2?'🥉':'#'+(i+1)}</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:s.isMe?800:600,fontSize:14}}>{s.username}{s.isMe?' (אתה)':''}</div>
                <div style={{fontSize:10,color:'#9E8E80'}}>
                  {'⭐'.repeat(s.stars||1)}
                  {s.difficulty && <span style={{marginRight:6,padding:'1px 6px',borderRadius:4,fontSize:9,
                    background:diffColor(s.difficulty)+'18',color:diffColor(s.difficulty),fontWeight:700}}>
                    {diffLabel(s.difficulty)}</span>}
                  {s.date && <span style={{marginRight:4}}>{new Date(s.date).toLocaleDateString('he-IL')}</span>}
                </div>
              </div>
              <div style={{textAlign:'left'}}>
                <div style={{fontSize:18,fontWeight:800,color:s.score>=0?'#43A047':'#E53935'}}>₪{s.score}</div>
              </div>
            </div>
          ))}
        </div>}
      </div>
    </div>
  );
};

// ===== ACHIEVEMENTS MODAL =====
const AchievementsModal = ({onClose, unlocked}) => {
  const unlockedCount = unlocked.length;
  const total = ACHIEVEMENTS.length;
  const pct = Math.round((unlockedCount/total)*100);
  return (
    <div style={{position:'fixed',inset:0,zIndex:60,background:'rgba(0,0,0,.5)',backdropFilter:'blur(4px)',overflowY:'auto'}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{maxWidth:500,margin:'20px auto',background:'linear-gradient(180deg,#FFF8E7,#FFF0D4)',
        borderRadius:20,padding:'20px 16px',minHeight:'60vh',boxShadow:'0 20px 60px rgba(0,0,0,.2)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div style={{fontWeight:800,fontSize:20}}>🏆 הישגים</div>
          <button onClick={onClose} style={{background:'#E53935',color:'#FFF',border:'none',borderRadius:10,
            padding:'6px 14px',fontSize:14,fontWeight:700,cursor:'pointer'}}>✕</button>
        </div>
        <div style={{background:'rgba(255,255,255,.7)',borderRadius:12,padding:'10px 14px',marginBottom:14}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
            <span style={{fontSize:13,fontWeight:700,color:'#6D4C41'}}>
              {unlockedCount} / {total} הישגים</span>
            <span style={{fontSize:16,fontWeight:800,color:'#D4A017'}}>{pct}%</span>
          </div>
          <div style={{height:8,background:'#F5E6C9',borderRadius:4,overflow:'hidden'}}>
            <div style={{height:'100%',width:pct+'%',background:'linear-gradient(90deg,#FFD700,#FF6F00)',
              transition:'width .4s',borderRadius:4}}/>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {ACHIEVEMENTS.map(a => {
            const isUnlocked = unlocked.includes(a.id);
            return (
              <div key={a.id} style={{
                background: isUnlocked ? 'linear-gradient(135deg,#FFF9C4,#FFE082)' : '#F5F5F5',
                borderRadius:12, padding:'10px 12px',
                border: isUnlocked ? '2px solid #FFD700' : '1px solid #E0E0E0',
                opacity: isUnlocked ? 1 : 0.6,
                boxShadow: isUnlocked ? '0 3px 10px rgba(255,215,0,.2)' : 'none',
                position:'relative'
              }}>
                <div style={{fontSize:28,marginBottom:2,filter:isUnlocked?'none':'grayscale(1)'}}>
                  {isUnlocked ? a.em : '🔒'}
                </div>
                <div style={{fontSize:12,fontWeight:800,color:isUnlocked?'#3E2723':'#9E8E80'}}>{a.n}</div>
                <div style={{fontSize:10,color:isUnlocked?'#6D4C41':'#9E8E80',lineHeight:1.3,marginTop:2}}>{a.d}</div>
                {isUnlocked && <div style={{position:'absolute',top:6,left:6,fontSize:10,color:'#43A047',fontWeight:700}}>✓</div>}
              </div>
            );
          })}
        </div>
        {unlockedCount === total && <div style={{marginTop:16,padding:'14px 16px',textAlign:'center',

// Smooth count-up hook: returns a display value that animates toward `target`
const useCountUp = (target, duration=600) => {
  const [display, setDisplay] = useState(target);
  const fromRef = useRef(target);
  useEffect(() => {
    const from = fromRef.current;
    const to = target;
    if (from === to) return;
    const start = performance.now();
    let raf;
    const tick = (now) => {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      setDisplay(from + (to - from) * eased);
      if (t < 1) raf = requestAnimationFrame(tick);
      else fromRef.current = to;
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [target, duration]);
  return display;
};

    <div style={{maxWidth:600,margin:"20px auto",background:C.bg,borderRadius:16,padding:"16px 14px",minHeight:"80vh"}}>
     <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{fontWeight:800,fontSize:18}}>📊 דשבורד ניתוח</div>
      <button onClick={()=>setShowDash(false)} style={{background:C.rd,color:"#FFF",border:"none",borderRadius:8,
       padding:"4px 12px",fontSize:14,fontWeight:700,cursor:"pointer"}}>✕</button></div>
     {dayLog.length===0?<div style={{textAlign:"center",color:C.tM,padding:40}}>אין נתונים עדיין — שחק יום אחד לפחות</div>:(()=>{
      const w=240,h=65,pad=5;const colors=[C.gn,"#7B1FA2","#1976D2","#E65100"];
      const mkLine=(data,color,sw="2")=>{if(!data||data.length<1)return null;
       const mn=Math.min(...data),mx=Math.max(...data),rg=mx-mn||1;
       return <polyline points={data.map((v,j)=>{const x=pad+j*((w-2*pad)/Math.max(data.length-1,1));
        const y=h-pad-((v-mn)/rg)*(h-2*pad);return x+","+y;}).join(" ")}
        fill="none" stroke={color} strokeWidth={sw} strokeLinejoin="round"/>;};
      const mkDots=(data,color)=>{if(!data||data.length<1)return null;
       const mn=Math.min(...data),mx=Math.max(...data),rg=mx-mn||1;
       return data.map((v,j)=>{const x=pad+j*((w-2*pad)/Math.max(data.length-1,1));
        const y=h-pad-((v-mn)/rg)*(h-2*pad);
        return <circle key={j} cx={x} cy={y} r={2} fill={color}/>;});};
      const dayLabels=dayLog.map((d,j)=>{const x=pad+j*((w-2*pad)/Math.max(dayLog.length-1,1));
       return <text key={j} x={x} y={h+10} textAnchor="middle" fontSize="7" fill="#999">{"י"+d.dy}</text>;});
      const chartWrap=(title,children)=><div style={{marginBottom:14}}>
       <div style={{fontWeight:700,fontSize:12,marginBottom:4}}>{title}</div>
       <svg viewBox={"0 0 "+w+" "+(h+14)} style={{width:"100%",height:h+18}}>{children}{dayLabels}</svg></div>;
      // === Summary insights ===
      const totRev = dayLog.reduce((s,d)=>s+d.myRev,0);
      const totExp = dayLog.reduce((s,d)=>s+d.myExp,0);
      const totProfit = dayLog.reduce((s,d)=>s+d.myProfit,0);
      const totSold = dayLog.reduce((s,d)=>s+d.mySold,0);
      const totPrep = dayLog.reduce((s,d)=>s+d.myPrep,0);
      const avgProfit = dayLog.length>0 ? totProfit/dayLog.length : 0;
      const margin = totRev>0 ? (totProfit/totRev)*100 : 0;
      const wastePct = totPrep>0 ? ((totPrep-totSold)/totPrep)*100 : 0;
      const profitDays = dayLog.filter(d=>d.myProfit>0).length;
      const bestDay = dayLog.length>0 ? dayLog.reduce((b,d)=>d.myProfit>b.myProfit?d:b,dayLog[0]) : null;
      const worstDay = dayLog.length>0 ? dayLog.reduce((w,d)=>d.myProfit<w.myProfit?d:w,dayLog[0]) : null;
      // Best weather for profit
      const weatherProfit = {};
      dayLog.forEach(d => {
        const w = d.weather.split(" ")[0];
        if (!weatherProfit[w]) weatherProfit[w] = {sum:0, count:0};
        weatherProfit[w].sum += d.myProfit; weatherProfit[w].count++;
      });
      const weatherAvg = Object.entries(weatherProfit).map(([w,x])=>({w,avg:x.sum/x.count,count:x.count}))
        .sort((a,b)=>b.avg-a.avg);
      return <div>
       {/* Summary insights card */}
       <Card style={{background:"linear-gradient(135deg,#E3F2FD,#BBDEFB)",border:"2px solid #64B5F6"}}>
        <div style={{fontWeight:800,fontSize:14,marginBottom:8,textAlign:"center"}}>📊 סיכום כולל</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:8}}>
         <div style={{background:"#FFF",borderRadius:8,padding:"6px 4px",textAlign:"center"}}>
          <div style={{fontSize:9,color:C.tM}}>💵 רווח ממוצע</div>
          <div style={{fontSize:15,fontWeight:800,color:avgProfit>=0?C.gn:C.rd}}>{"₪"+avgProfit.toFixed(0)}</div></div>
         <div style={{background:"#FFF",borderRadius:8,padding:"6px 4px",textAlign:"center"}}>
          <div style={{fontSize:9,color:C.tM}}>📐 שיעור רווח</div>
          <div style={{fontSize:15,fontWeight:800,color:margin>=20?C.gn:margin>=0?C.ac:C.rd}}>{margin.toFixed(0)+"%"}</div></div>
         <div style={{background:"#FFF",borderRadius:8,padding:"6px 4px",textAlign:"center"}}>
          <div style={{fontSize:9,color:C.tM}}>✅ ימים רווחיים</div>
          <div style={{fontSize:15,fontWeight:800,color:C.gn}}>{profitDays+"/"+dayLog.length}</div></div>
         <div style={{background:"#FFF",borderRadius:8,padding:"6px 4px",textAlign:"center"}}>
          <div style={{fontSize:9,color:C.tM}}>🥤 נמכר/הוכן</div>
          <div style={{fontSize:13,fontWeight:800,color:C.tx}}>{totSold+"/"+totPrep}</div></div>
         <div style={{background:"#FFF",borderRadius:8,padding:"6px 4px",textAlign:"center"}}>
          <div style={{fontSize:9,color:C.tM}}>🗑️ בזבוז</div>
          <div style={{fontSize:15,fontWeight:800,color:wastePct<=10?C.gn:wastePct<=25?C.ac:C.rd}}>{wastePct.toFixed(0)+"%"}</div></div>
         <div style={{background:"#FFF",borderRadius:8,padding:"6px 4px",textAlign:"center"}}>
          <div style={{fontSize:9,color:C.tM}}>⭐ מוניטין</div>
          <div style={{fontSize:15,fontWeight:800,color:C.ac}}>{rp}</div></div>
        </div>
        {bestDay&&worstDay&&bestDay.dy!==worstDay.dy&&<div style={{display:"flex",gap:6,fontSize:10}}>
         <div style={{flex:1,background:"#E8F5E9",borderRadius:6,padding:"4px 6px",textAlign:"center"}}>
          <span style={{color:C.gn,fontWeight:700}}>🏆 הטוב: י{bestDay.dy}</span> <span style={{color:C.tL}}>₪{bestDay.myProfit.toFixed(0)}</span></div>
         <div style={{flex:1,background:"#FFEBEE",borderRadius:6,padding:"4px 6px",textAlign:"center"}}>
          <span style={{color:C.rd,fontWeight:700}}>📉 הקשה: י{worstDay.dy}</span> <span style={{color:C.tL}}>₪{worstDay.myProfit.toFixed(0)}</span></div>
        </div>}
        {weatherAvg.length>=2&&<div style={{marginTop:6,padding:"6px 8px",background:"rgba(255,255,255,.6)",borderRadius:6,fontSize:10,textAlign:"center"}}>
         <span style={{color:C.tM}}>מזג אוויר מנצח:</span> <b>{weatherAvg[0].w}</b> <span style={{color:C.gn}}>(₪{weatherAvg[0].avg.toFixed(0)} ממוצע)</span>
        </div>}
       </Card>
       {/* Expense breakdown donut */}
       {(()=>{
        const catLemon = dayLog.reduce((s,d)=>{const pr=d.prices?.lemon||0;return s+(d.recipe?.l||0)*d.myPrep*pr;},0);
        const catHoney = dayLog.reduce((s,d)=>{const pr=d.prices?.honey||0;return s+(d.recipe?.h||0)*d.myPrep*pr;},0);
        const catIce = dayLog.reduce((s,d)=>{const pr=d.prices?.ice||0;return s+(d.recipe?.i||0)*d.myPrep*pr;},0);
        const catMat = catLemon + catHoney + catIce;
        const catOther = Math.max(0, totExp - catMat);
        const parts = [
         {n:"🍋 לימון", v:catLemon, c:"#FBC02D"},
         {n:"🍯 דבש", v:catHoney, c:"#FF6F00"},
         {n:"🧊 קרח", v:catIce, c:"#4FC3F7"},
         {n:"🏠 אחר", v:catOther, c:"#9575CD"},
        ].filter(p=>p.v>0);
        const total = parts.reduce((s,p)=>s+p.v,0);
        if (total <= 0) return null;
        let cumAngle = -Math.PI/2;
        const cx=60, cy=60, r=50, ir=28;
        const arcs = parts.map(p => {
         const a = (p.v/total) * Math.PI * 2;
         const x1 = cx + r*Math.cos(cumAngle), y1 = cy + r*Math.sin(cumAngle);
         const x2 = cx + r*Math.cos(cumAngle+a), y2 = cy + r*Math.sin(cumAngle+a);
         const xi1 = cx + ir*Math.cos(cumAngle), yi1 = cy + ir*Math.sin(cumAngle);
         const xi2 = cx + ir*Math.cos(cumAngle+a), yi2 = cy + ir*Math.sin(cumAngle+a);
         const large = a > Math.PI ? 1 : 0;
         const d = `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${xi2} ${yi2} A ${ir} ${ir} 0 ${large} 0 ${xi1} ${yi1} Z`;
         cumAngle += a;
         return {d, p};
        });
        return <Card>
         <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>🥧 פירוק הוצאות</div>
         <div style={{display:"flex",alignItems:"center",gap:12}}>
          <svg viewBox="0 0 120 120" style={{width:130,height:130,flexShrink:0}}>
           {arcs.map((a,i)=><path key={i} d={a.d} fill={a.p.c} stroke="#FFF" strokeWidth="1.5"/>)}
           <text x="60" y="58" textAnchor="middle" fontSize="10" fill="#9E8E80">סה״כ</text>
           <text x="60" y="72" textAnchor="middle" fontSize="13" fontWeight="800" fill="#3E2723">₪{total.toFixed(0)}</text>
          </svg>
          <div style={{flex:1,display:"flex",flexDirection:"column",gap:6}}>
           {parts.map((p,i)=>{const pct=(p.v/total*100).toFixed(0);return(
            <div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:11}}>
             <div style={{width:12,height:12,borderRadius:3,background:p.c,flexShrink:0}}/>
             <div style={{flex:1}}>{p.n}</div>
             <div style={{fontWeight:700}}>₪{p.v.toFixed(0)}</div>
             <div style={{color:C.tM,fontSize:10,minWidth:30,textAlign:"left"}}>{pct}%</div>
            </div>);})}
          </div>
         </div>
        </Card>;
       })()}
       {}
       <Card><div style={{fontWeight:700,fontSize:13,marginBottom:6}}>🌤️ היסטוריית מזג אוויר</div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",fontSize:10}}>
         {dayLog.map((d,i)=><div key={i} style={{background:"#F5F5F5",borderRadius:6,padding:"3px 6px",textAlign:"center",minWidth:50}}>
          <div style={{fontWeight:700}}>{"י"+d.dy}</div>
          <div>{d.weather.split(" ")[0]+" "+d.temp+"°"}</div>
          {d.event&&<div style={{fontSize:8,color:C.ac}}>{d.event.split(" ")[0]}</div>}
         </div>)}</div></Card>
       {}
       <Card><div style={{fontWeight:700,fontSize:13,marginBottom:4}}>💲 היסטוריית מחירים</div>
        {chartWrap("🍋 לימון",<>{mkLine(dayLog.map(d=>d.prices.lemon),C.lD)}{mkDots(dayLog.map(d=>d.prices.lemon),C.lD)}</>)}
        {chartWrap("🍯 דבש",<>{mkLine(dayLog.map(d=>d.prices.honey),C.hn)}{mkDots(dayLog.map(d=>d.prices.honey),C.hn)}</>)}
        {chartWrap("🧊 קרח",<>{mkLine(dayLog.map(d=>d.prices.ice),C.iD)}{mkDots(dayLog.map(d=>d.prices.ice),C.iD)}</>)}
       </Card>
       {}
       <Card><div style={{fontWeight:700,fontSize:13,marginBottom:4}}>💰 הביצועים שלי</div>
        {chartWrap("הכנסות יומיות",<>{mkLine(dayLog.map(d=>d.myRev),C.gn)}{mkDots(dayLog.map(d=>d.myRev),C.gn)}</>)}
        {chartWrap("רווח יומי",<>{mkLine(dayLog.map(d=>d.myProfit),C.gn)}{mkDots(dayLog.map(d=>d.myProfit),C.gn)}</>)}
        {chartWrap("⭐ מוניטין",<>{mkLine(dayLog.map(d=>d.rep),"#FF6F00")}{mkDots(dayLog.map(d=>d.rep),"#FF6F00")}</>)}
       </Card>
       {}
       {bestCup&&<Card style={{background:"linear-gradient(135deg,#FFF9C4,#FFF8E1)",border:"1px solid #FFD600"}}>
        <div style={{fontWeight:700,fontSize:13}}>🏆 הכוס הטובה ביותר שלך</div>
        <div style={{fontSize:12,marginTop:4}}>{"יום "+bestCup.day+": "+bestCup.recipe.l+"🍋"+bestCup.recipe.h+"🍯"+bestCup.recipe.i+"🧊 — ציון "+bestCup.score+"/100"}</div></Card>}
       <Card><div style={{fontWeight:700,fontSize:13,marginBottom:6}}>📋 היסטוריית החלטות</div>
        <div style={{overflowX:"auto"}}><table style={{width:"100%",fontSize:9,borderCollapse:"collapse",textAlign:"center"}}>
         <thead><tr style={{background:"#F5F5F5"}}>
          {["יום","מתכון","מחיר","הכנו","מכרנו","הכנסות","רווח","⭐"].map(h2=><th key={h2} style={{padding:3,borderBottom:"1px solid #DDD"}}>{h2}</th>)}
         </tr></thead>
         <tbody>{dayLog.map((d,i)=><tr key={i} style={{borderBottom:"1px solid #EEE"}}>
          <td style={{padding:2,fontWeight:700}}>{"י"+d.dy}</td>
          <td>{d.recipe.l+"🍋"+d.recipe.h+"🍯"+d.recipe.i+"🧊"}</td>
          <td>{"₪"+d.price}</td><td>{d.myPrep}</td><td>{d.mySold}</td>
          <td style={{color:C.gn}}>{"₪"+d.myRev}</td>
          <td style={{fontWeight:700,color:d.myProfit>=0?C.gn:C.rd}}>{"₪"+d.myProfit.toFixed(0)}</td>
          <td>{d.rep}</td>
         </tr>)}</tbody></table></div></Card>
       {}
       {hasComps&&dayLog[0]?.compSnap&&dayLog[0].compSnap.length>0&&<Card>
        <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>🏪 השוואה למתחרים</div>
        {(()=>{const nC=dayLog[0].compSnap.length;
         const names=["🍋 אתה",...dayLog[0].compSnap.map(c=>c.n)];
         const myCum=[];let ms=0;dayLog.forEach(d=>{ms+=d.myRev;myCum.push(ms);});
         const compCums=Array.from({length:nC}).map((_,ci)=>{let s=0;return dayLog.map(d=>{s+=(d.compSnap[ci]?.rev||0);return s;});});
         return <div>
          {chartWrap("📈 הכנסות מצטברות",<>
           {mkLine(myCum,colors[0],"2.5")}
           {compCums.map((c,ci)=>mkLine(c,colors[(ci+1)%colors.length],"1.5"))}
          </>)}
          <div style={{display:"flex",gap:6,justifyContent:"center",fontSize:9,marginTop:-8,marginBottom:8}}>
           {names.map((n,i)=><span key={i} style={{display:"flex",alignItems:"center",gap:2}}>
            <span style={{width:10,height:3,background:colors[i%colors.length],borderRadius:1,display:"inline-block"}}/>{n}</span>)}</div>
          {}
          <div style={{overflowX:"auto"}}><table style={{width:"100%",fontSize:9,borderCollapse:"collapse",textAlign:"center"}}>
           <thead><tr style={{background:"#F5F5F5"}}>
            <th style={{padding:2,borderBottom:"1px solid #DDD"}}>יום</th>
            <th style={{padding:2,borderBottom:"1px solid #DDD",background:"#E8F5E9"}}>אני ₪</th>
            {dayLog[0].compSnap.map((c,i)=><th key={i} style={{padding:2,borderBottom:"1px solid #DDD"}}>{c.n+" ₪"}</th>)}
           </tr></thead>
           <tbody>{dayLog.map((d,j)=><tr key={j} style={{borderBottom:"1px solid #EEE"}}>
            <td style={{padding:2}}>{"י"+d.dy}</td>
            <td style={{padding:2,background:"#F9FFF9",fontWeight:700}}>{d.myRev}</td>
            {d.compSnap.map((c,i)=><td key={i} style={{padding:2}}>{c.rev}</td>)}
           </tr>)}</tbody></table></div>
         </div>;})()}
       </Card>}
       {}
       <Card><div style={{fontWeight:700,fontSize:13,marginBottom:6}}>📅 אירועים</div>
        {dayLog.filter(d=>d.event).length===0?<div style={{fontSize:11,color:C.tM}}>לא היו אירועים עד כה</div>:
         dayLog.filter(d=>d.event).map((d,i)=><div key={i} style={{fontSize:11,padding:"2px 0",borderBottom:"1px solid #EEE"}}>
          {"יום "+d.dy+": "+d.event}</div>)}
       </Card>
       {}
       {dayLog.some(d=>d.actions?.length>0||d.npcActs?.some(na=>na.acts.length>0))&&
       <Card><div style={{fontWeight:700,fontSize:13,marginBottom:6}}>⚡ היסטוריית פעולות</div>
        {(()=>{const actNames={flyer:"📄 פליירים",banner:"🎈 בלונים",social:"📱 פוסט",taste:"🎁 טעימות",ads:"📢 קמפיין",rumor:"🗣️ שמועות",signs:"🚫 שלטים"};
        return dayLog.map((d,i)=>{const myActs=(d.actions||[]).map(a=>actNames[a]||a);const theirActs=d.npcActs||[];
         const hasAny=myActs.length>0||theirActs.some(na=>na.acts.length>0);
         if(!hasAny)return null;
         return <div key={i} style={{padding:"4px 0",borderBottom:"1px solid #EEE",fontSize:10}}>
          <div style={{fontWeight:700}}>{"יום "+d.dy}</div>
          {(myActs.length>0)&&<div style={{color:C.gn}}>{"🍋 אתה: "+myActs.join(", ")}</div>}
          {theirActs.filter(na=>na.acts.length>0).map((na,j)=>
           <div key={j} style={{color:C.pu}}>{na.n+": "+na.acts.join(", ")}</div>)}
         </div>;});})()}
       </Card>}
      </div>;})()}
    </div></div>}
   {}
   {shT&&tSt<TUT.length&&<TutBubble step={TUT[tSt]} current={tSt+1} total={TUT.length} onNext={()=>{
    const ns=tSt+1;if(ns>=TUT.length){setShT(false);return;}
    const cur=TUT[tSt].ph.replace(/\d/,""),nxt=TUT[ns].ph.replace(/\d/,"");
    if(nxt!==cur){setShT(false);setTSt(ns);}else setTSt(ns);
   }} onSkip={()=>{setShT(false);setTOn(false);}}/>}
   {showAch && <AchievementsModal onClose={()=>setShowAch(false)} unlocked={unlockedAch}/>}
   {achToasts.length > 0 && <AchievementToast achievement={achToasts[0]}/>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<LemonadeGame />);
</script>
</body>
</html>
